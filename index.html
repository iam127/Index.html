<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Jimena 🌻</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #1c1200 0%, #080500 100%);
    font-family: 'Dancing Script', cursive;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== FLOATING BG FLOWERS ===== */
  .bg-flowers { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .bf { position:absolute; bottom:-80px; animation:floatUp linear infinite; opacity:0; user-select:none; }
  @keyframes floatUp {
    0%   { transform:translateY(0) rotate(0deg); opacity:0.8; }
    100% { transform:translateY(-115vh) rotate(360deg); opacity:0; }
  }

  /* ===== SCREEN 1: INPUT ===== */
  #screen-input {
    position:relative; z-index:10;
    background:rgba(255,220,0,0.05);
    border:2px solid rgba(255,210,0,0.2);
    border-radius:35px;
    padding:55px 45px 50px;
    text-align:center;
    max-width:460px; width:90%;
    backdrop-filter:blur(14px);
    box-shadow:0 0 70px rgba(255,200,0,0.12);
    transition:opacity 0.5s, transform 0.5s;
  }
  .deco { font-size:2.2rem; letter-spacing:10px; margin-bottom:14px; animation:sway 3s ease-in-out infinite; }
  @keyframes sway { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
  .title1 { font-family:'Pacifico',cursive; font-size:2rem; color:#ffd700; text-shadow:0 0 25px rgba(255,215,0,0.5); margin-bottom:8px; }
  .sub1 { color:#ffe87a; font-size:1.15rem; margin-bottom:32px; opacity:0.8; }
  .name-input {
    width:100%; padding:15px 22px;
    border:2px solid rgba(255,210,0,0.35); border-radius:50px;
    background:rgba(255,255,180,0.06); color:#fff;
    font-family:'Dancing Script',cursive; font-size:1.5rem;
    text-align:center; outline:none;
    transition:border-color 0.3s,box-shadow 0.3s;
    caret-color:#ffd700; margin-bottom:20px;
  }
  .name-input::placeholder { color:rgba(255,230,100,0.35); }
  .name-input:focus { border-color:#ffd700; box-shadow:0 0 28px rgba(255,215,0,0.35); }
  .btn {
    background:linear-gradient(135deg,#ffcc00,#ff9f00);
    border:none; border-radius:50px; padding:15px 44px;
    color:#3a1f00; font-family:'Pacifico',cursive; font-size:1.1rem;
    cursor:pointer; box-shadow:0 6px 28px rgba(255,175,0,0.45);
    transition:transform 0.2s,box-shadow 0.2s;
  }
  .btn:hover { transform:scale(1.06); }
  .btn:active { transform:scale(0.97); }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)}
    40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)}
  }
  .shake { animation:shake 0.45s ease; }

  /* ===== SCREEN 2: FELIZ DÍA ===== */
  #screen-feliz {
    display:none; position:fixed; inset:0; z-index:20;
    background:radial-gradient(ellipse at center, #1c1200 0%, #080500 100%);
    align-items:center; justify-content:center;
    overflow:hidden;
  }
  #screen-feliz.show { display:flex; animation:fadeIn 0.9s ease forwards; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* ===== FLOWER FRAME ===== */
  .frame-wrapper {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 54px 60px;
    animation: scaleIn 0.7s cubic-bezier(0.175,0.885,0.32,1.275) 0.2s both;
  }
  @keyframes scaleIn {
    from { transform:scale(0.5); opacity:0; }
    to   { transform:scale(1); opacity:1; }
  }

  /* FRAME SIDES - rendered with JS */
  .frame-side {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    pointer-events: none;
  }
  .frame-flower {
    font-size: clamp(1.3rem, 3.5vw, 2rem);
    line-height: 1;
    animation: frameSway 2s ease-in-out infinite, framePop 0.5s ease backwards;
    display: inline-block;
  }
  @keyframes frameSway {
    0%,100% { transform:rotate(-8deg) scale(1); }
    50%     { transform:rotate(8deg) scale(1.15); filter:brightness(1.4) drop-shadow(0 0 6px #ffd700); }
  }
  @keyframes framePop {
    0%   { transform:scale(0); opacity:0; }
    80%  { transform:scale(1.2); }
    100% { transform:scale(1); opacity:1; }
  }

  /* CORNERS */
  .corner {
    position: absolute;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    animation: cornerSpin 4s ease-in-out infinite;
    line-height:1;
  }
  @keyframes cornerSpin {
    0%,100% { transform:rotate(0deg) scale(1); filter:brightness(1); }
    50%     { transform:rotate(20deg) scale(1.2); filter:brightness(1.5) drop-shadow(0 0 10px #ffd700); }
  }
  .corner.tl { top:-10px; left:-10px; }
  .corner.tr { top:-10px; right:-10px; }
  .corner.bl { bottom:-10px; left:-10px; }
  .corner.br { bottom:-10px; right:-10px; }

  /* ===== TEXT INSIDE FRAME ===== */
  .content-inside {
    text-align: center;
    z-index: 2;
  }

  .feliz-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(3rem, 12vw, 7rem);
    line-height: 1.1;
    background: linear-gradient(160deg, #fff7a1 0%, #ffd700 40%, #ffab00 70%, #ffe066 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 4px 16px rgba(255,200,0,0.6));
    animation: textPulse 2.5s ease-in-out infinite;
    display: block;
  }
  .dia-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(3rem, 12vw, 7rem);
    line-height: 1.1;
    background: linear-gradient(160deg, #fff7a1 0%, #ffd700 40%, #ffab00 70%, #ffe066 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 4px 16px rgba(255,200,0,0.6));
    animation: textPulse 2.5s 0.3s ease-in-out infinite;
    display: block;
  }
  @keyframes textPulse {
    0%,100% { filter:drop-shadow(0 4px 16px rgba(255,200,0,0.5)); }
    50%     { filter:drop-shadow(0 4px 35px rgba(255,220,0,1)); }
  }

  .jimena-sub {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    color: #ffe87a;
    margin-top: 10px;
    opacity: 0;
    animation: fadeUp 0.8s 1.2s forwards;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(15px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* burst */
  .burst { position:fixed; pointer-events:none; z-index:999; font-size:2rem; animation:burstAnim 1.5s ease-out forwards; }
  @keyframes burstAnim {
    0%  { opacity:1; transform:translate(0,0) scale(1.3) rotate(0deg); }
    100%{ opacity:0; transform:translate(var(--dx),var(--dy)) scale(0.1) rotate(var(--dr)); }
  }
</style>
</head>
<body>

<div class="bg-flowers" id="bgFlowers"></div>

<!-- PANTALLA 1 -->
<div id="screen-input">
  <div class="deco">🌻🌼🌻</div>
  <div class="title1">¡Escribe tu nombre!</div>
  <p class="sub1">y descubre tu sorpresa 🌸</p>
  <input id="nameInput" class="name-input" type="text" placeholder="Tu nombre aquí 🌼" maxlength="20" autocomplete="off"/>
  <br>
  <button class="btn" onclick="reveal()">✨ ¡Ver mi sorpresa! ✨</button>
</div>

<!-- PANTALLA 2 -->
<div id="screen-feliz">
  <div class="frame-wrapper" id="frameWrapper">
    <!-- corners -->
    <div class="corner tl">🌻</div>
    <div class="corner tr">🌻</div>
    <div class="corner bl">🌻</div>
    <div class="corner br">🌻</div>

    <!-- flower border sides injected by JS -->
    <div class="frame-side" id="sideTop"></div>
    <div class="frame-side" id="sideBottom"></div>
    <div class="frame-side" id="sideLeft" style="flex-direction:column;"></div>
    <div class="frame-side" id="sideRight" style="flex-direction:column;"></div>

    <!-- CONTENT -->
    <div class="content-inside">
      <span class="feliz-text">¡FELIZ</span>
      <span class="dia-text">DÍA!</span>
      <div class="jimena-sub">🌻 Jimena 🌻</div>
    </div>
  </div>
</div>

<script>
// ===== BUILD FLOWER FRAME =====
const TOP_FLOWERS    = ['🌻','🌼','⭐','🌼','🌻','🌼','⭐','🌼'];
const SIDE_FLOWERS   = ['🌼','🌻','⭐','🌻','🌼','🌻','⭐','🌻'];

function buildFrame() {
  const wrapper = document.getElementById('frameWrapper');
  const W = wrapper.offsetWidth;
  const H = wrapper.offsetHeight;

  const flSize = Math.max(28, Math.min(36, W * 0.055)); // flower size px approx
  const gap = 2;
  const step = flSize + gap;

  const hCount = Math.floor((W - flSize) / step);
  const vCount = Math.floor((H - flSize) / step);

  // TOP
  const top = document.getElementById('sideTop');
  top.style.top = '-28px';
  top.style.left = '0'; top.style.right = '0';
  top.style.gap = gap + 'px';
  top.innerHTML = '';
  for (let i = 0; i < hCount; i++) {
    const s = document.createElement('span');
    s.className = 'frame-flower';
    s.textContent = TOP_FLOWERS[i % TOP_FLOWERS.length];
    s.style.animationDelay = `${i * 0.08}s, ${i * 0.1}s`;
    top.appendChild(s);
  }

  // BOTTOM
  const bot = document.getElementById('sideBottom');
  bot.style.bottom = '-28px';
  bot.style.left = '0'; bot.style.right = '0';
  bot.style.gap = gap + 'px';
  bot.innerHTML = '';
  for (let i = 0; i < hCount; i++) {
    const s = document.createElement('span');
    s.className = 'frame-flower';
    s.textContent = TOP_FLOWERS[i % TOP_FLOWERS.length];
    s.style.animationDelay = `${i * 0.08 + 0.3}s, ${i * 0.1 + 0.5}s`;
    bot.appendChild(s);
  }

  // LEFT
  const left = document.getElementById('sideLeft');
  left.style.left = '-28px';
  left.style.top = '0'; left.style.bottom = '0';
  left.style.gap = gap + 'px';
  left.innerHTML = '';
  for (let i = 0; i < vCount; i++) {
    const s = document.createElement('span');
    s.className = 'frame-flower';
    s.textContent = SIDE_FLOWERS[i % SIDE_FLOWERS.length];
    s.style.animationDelay = `${i * 0.08 + 0.1}s, ${i * 0.1 + 0.2}s`;
    left.appendChild(s);
  }

  // RIGHT
  const right = document.getElementById('sideRight');
  right.style.right = '-28px';
  right.style.top = '0'; right.style.bottom = '0';
  right.style.gap = gap + 'px';
  right.innerHTML = '';
  for (let i = 0; i < vCount; i++) {
    const s = document.createElement('span');
    s.className = 'frame-flower';
    s.textContent = SIDE_FLOWERS[i % SIDE_FLOWERS.length];
    s.style.animationDelay = `${i * 0.08 + 0.2}s, ${i * 0.1 + 0.3}s`;
    right.appendChild(s);
  }
}

// FLOATING BG
const flEmojis = ['🌻','🌼','🌸','💛','⭐','✨'];
const bgDiv = document.getElementById('bgFlowers');
for (let i = 0; i < 35; i++) {
  const f = document.createElement('div');
  f.className = 'bf';
  f.textContent = flEmojis[Math.floor(Math.random() * flEmojis.length)];
  f.style.left = Math.random() * 100 + 'vw';
  f.style.fontSize = (0.9 + Math.random() * 1.8) + 'rem';
  f.style.animationDuration = (6 + Math.random() * 10) + 's';
  f.style.animationDelay = (Math.random() * 12) + 's';
  bgDiv.appendChild(f);
}

function reveal() {
  const raw = document.getElementById('nameInput').value.trim();
  if (!raw) { doShake(); return; }
  if (raw.toLowerCase() !== 'jimena') {
    doShake();
    document.getElementById('nameInput').value = '';
    document.getElementById('nameInput').placeholder = '¡Solo para Jimena! 🌻';
    return;
  }

  const s1 = document.getElementById('screen-input');
  s1.style.opacity = '0';
  s1.style.transform = 'scale(0.9)';
  setTimeout(() => {
    s1.style.display = 'none';
    const s2 = document.getElementById('screen-feliz');
    s2.classList.add('show');
    // build frame after element is visible
    setTimeout(buildFrame, 50);
  }, 400);

  launchBurst();
}

function doShake() {
  const inp = document.getElementById('nameInput');
  inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
  inp.style.borderColor = '#ff9900';
  setTimeout(() => inp.style.borderColor = '', 800);
}

function launchBurst() {
  const fx = ['🌻','🌼','💛','⭐','✨','🌟'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'burst';
      el.textContent = fx[Math.floor(Math.random() * fx.length)];
      el.style.left  = (Math.random() * 100) + 'vw';
      el.style.top   = (Math.random() * 100) + 'vh';
      el.style.setProperty('--dx', (Math.random() * 400 - 200) + 'px');
      el.style.setProperty('--dy', (Math.random() * -400 - 50) + 'px');
      el.style.setProperty('--dr', (Math.random() * 720 - 360) + 'deg');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1700);
    }, i * 55);
  }
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') reveal();
});

window.addEventListener('resize', () => {
  if (document.getElementById('screen-feliz').classList.contains('show')) buildFrame();
});
</script>
</body>
</html>
