<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>El Fenómeno de los Sueños</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07040f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel Decorative', serif;
      overflow: hidden;
    }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .stars span {
      position: absolute; border-radius: 50%; background: #fff;
      animation: tw var(--d) ease-in-out infinite; opacity: 0;
    }
    @keyframes tw { 0%,100%{opacity:0} 50%{opacity:var(--o)} }

    .moon {
      position: fixed; top: 5vh; right: 7vw;
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f0eaff, #c5aff0 60%, #8060c0);
      box-shadow: 0 0 40px #c5aff088, 0 0 90px #8060c044;
      animation: glow 4s ease-in-out infinite alternate; z-index: 1;
    }
    @keyframes glow {
      from { box-shadow: 0 0 40px #c5aff088; }
      to   { box-shadow: 0 0 70px #f0eaffcc, 0 0 130px #c5aff066; }
    }

    /* PANTALLA 1 */
    .screen {
      position: relative; z-index: 2;
      text-align: center; padding: 24px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .screen.hide {
      opacity: 0; transform: scale(0.9); pointer-events: none;
      position: absolute;
    }

    .eyebrow {
      font-size: 0.6rem; letter-spacing: 0.5em; color: #f5c842;
      margin-bottom: 28px; animation: fadeUp 1s ease 0.3s both;
    }
    h1 {
      font-size: clamp(2rem, 8vw, 4.5rem); font-weight: 900;
      background: linear-gradient(135deg, #f0eaff, #c5aff0, #f5c842, #f0eaff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.2; margin-bottom: 60px;
      filter: drop-shadow(0 0 25px #c5aff055);
      animation: fadeUp 1s ease 0.6s both;
    }
    .btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; letter-spacing: 0.25em;
      padding: 20px 56px; color: #07040f;
      background: linear-gradient(135deg, #f5c842, #e8a800, #f5c842);
      background-size: 200%; border: none; border-radius: 60px; cursor: pointer;
      box-shadow: 0 0 30px #f5c84266, 0 8px 30px #0009;
      animation: fadeUp 1s ease 0.9s both, shimmer 3s ease infinite;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    @keyframes shimmer { 0%,100%{background-position:0%} 50%{background-position:100%} }
    .btn:hover { transform: scale(1.07) translateY(-4px); box-shadow: 0 0 55px #f5c842aa; }
    .btn:active { transform: scale(0.96); }

    /* PANTALLA 2 */
    .screen2 {
      position: absolute; z-index: 2;
      text-align: center; padding: 24px;
      opacity: 0; transform: scale(1.1);
      pointer-events: none;
      transition: opacity 0.5s ease 0.3s, transform 0.5s cubic-bezier(.34,1.56,.64,1) 0.3s;
    }
    .screen2.show {
      opacity: 1; transform: scale(1); pointer-events: auto;
    }
    .big {
      font-size: clamp(2rem, 9vw, 5rem); font-weight: 900;
      color: #f5c842;
      text-shadow: 0 0 30px #f5c842bb, 0 0 60px #f5c84255;
      animation: shake 0.5s ease;
    }
    .smol {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.15rem;
      color: #c5aff0; margin-top: 16px; letter-spacing: 0.15em;
    }
    @keyframes shake {
      0%,100%{transform:rotate(0)} 20%{transform:rotate(-3deg)} 40%{transform:rotate(3deg)}
      60%{transform:rotate(-2deg)} 80%{transform:rotate(2deg)}
    }

    /* PARTICLES */
    .particle {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 999;
      animation: burst 0.9s ease forwards;
    }
    @keyframes burst {
      0%   { opacity:1; transform:translate(0,0) scale(1); }
      100% { opacity:0; transform:translate(var(--dx),var(--dy)) scale(0); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <!-- PANTALLA 1: título + botón -->
  <div class="screen" id="s1">
    <p class="eyebrow">✦ misterios de la noche ✦</p>
    <h1>El Fenómeno<br/>de los Sueños</h1>
    <button class="btn" onclick="revelar()">✦ Descubrir ✦</button>
  </div>

  <!-- PANTALLA 2: la broma -->
  <div class="screen2" id="s2">
    <p class="big">😴 ¡Investiga, Vaga! 😴</p>
    <p class="smol">Eso no se pregunta… ¡se estudia!</p>
  </div>

  <script>
    const sc = document.getElementById('stars');
    for (let i = 0; i < 140; i++) {
      const s = document.createElement('span');
      const sz = Math.random() * 2.5 + 0.5;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--o:${(Math.random()*0.6+0.2).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(2)}s`;
      sc.appendChild(s);
    }

    function revelar() {
      // particles
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const ang = Math.random() * 360, dist = Math.random() * 160 + 60;
        const col = ['#f5c842','#c5aff0','#ffffff'][Math.floor(Math.random()*3)];
        const sz = Math.random() * 10 + 4;
        p.style.cssText = `width:${sz}px;height:${sz}px;background:${col};left:50%;top:50%;--dx:${Math.cos(ang*Math.PI/180)*dist}px;--dy:${Math.sin(ang*Math.PI/180)*dist}px`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 950);
      }

      document.getElementById('s1').classList.add('hide');
      setTimeout(() => document.getElementById('s2').classList.add('show'), 200);
    }
  </script>
</body>
</html>
